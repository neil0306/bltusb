name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run smoke suite
        # Offline suite: no diskutil/security/sudo. The hardware suite (real
        # BitLocker USB) auto-skips in CI, so this stays green everywhere.
        run: bash test/bltusb_test.sh smoke
