name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    # Pin the OS image (not ubuntu-latest) so a runner refresh can't shift the
    # baseline. The shellcheck binary itself is pinned below, independent of
    # whatever version the image happens to preinstall.
    runs-on: ubuntu-24.04
    env:
      # Match the local dev shellcheck version so local <=> CI agree exactly.
      # This is what ends the SC2002-class "passes locally, fails on the runner"
      # drift: never use the runner's preinstalled shellcheck.
      SHELLCHECK_VERSION: v0.11.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install pinned ShellCheck
        run: |
          set -euo pipefail
          url="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl -fsSL "$url" -o /tmp/shellcheck.tar.xz
          mkdir -p /tmp/shellcheck
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp/shellcheck --strip-components=1
          sudo install -m 0755 "/tmp/shellcheck/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version
      - name: Run ShellCheck
        # -x follows `source`d files (dev-*.sh source dev-common.sh via a
        # `# shellcheck source=` directive). Lint the full tracked shell surface:
        # the CLI, its tests, the release script, and the helper dev/self-hosted
        # scripts.
        run: shellcheck -x bltusb test/bltusb_test.sh scripts/release.sh helper/scripts/*.sh
